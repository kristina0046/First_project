<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lekcie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/">Domov</a>
    <a href="/about">O nás</a>
    <a href="/register">Registrácia</a>
    <a href="/login">Prihlásenie</a>
    <a href="/create-lesson">Vytvoriť lekciu</a>
    <a href="/lessons">Lekcie</a>
</nav>

<h1>Zoznam lekcií</h1>

<form method="GET" action="/lessons">
    <label>Predmet:</label>
    <input type="text" name="subject">
    <label>Úroveň:</label>
    <input type="text" name="level">
    <button type="submit">Filtrovať</button>
</form>

<br>
{% for lesson in lessons %}
    <div>
        <h2>{{ lesson.title }}</h2>
        <p>Predmet: {{ lesson.subject }}</p>
        <p>Úroveň: {{ lesson.level }}</p>
        <p>Dátum: {{ lesson.lesson_date }}</p>
        <p>{{ lesson.description }}</p>

        <a href="/lesson/{{ lesson.id }}">Detail lekcie</a>
        <a href="/manage-students/{{ lesson.id }}">Správa študentov</a>
    </div>
    <hr>
{% endfor %}

</body>
</html>
